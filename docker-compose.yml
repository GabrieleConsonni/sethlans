services:
  backend:
    build: ./backend
    container_name: tabula-backend
    environment:
      # Postgres on the host (dedicated schema `tabula`). Override via .env (see .env.example).
      - TABULA_DB_URL=${TABULA_DB_URL:-postgresql+psycopg2://postgres:password@host.docker.internal:5432/tabula}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reaches the host's Postgres on Linux
    ports:
      - "9955:9955"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URL used by the browser to reach the backend on the host
        VITE_API_URL: http://localhost:9955
      # For a private/proxy npm registry, add the `npmrc` secret via
      # docker-compose.override.yml (see docker-compose.override.yml.example).
    container_name: tabula-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
