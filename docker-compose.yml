services:
  backend:
    build: ./backend
    container_name: tabula-backend
    environment:
      # Default: SQLite persistito nel volume `tabula-data`.
      # Per PostgreSQL: TABULA_DB_URL=postgresql+psycopg2://user:pass@host:5432/db
      - TABULA_DB_URL=${TABULA_DB_URL:-sqlite:////data/tabula.db}
    volumes:
      - tabula-data:/data
    ports:
      - "9955:9955"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URL usato dal browser per raggiungere il backend sull'host
        VITE_API_URL: http://localhost:9955
      # Per un registry npm privato: aggiungere il secret `npmrc` via
      # docker-compose.override.yml (vedi docker-compose.override.yml.example).
    container_name: tabula-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tabula-data:
