services:
  backend:
    build: ./backend
    container_name: tabula-backend
    environment:
      # Postgres esistente sull'host (schema dedicato `tabula`).
      - TABULA_DB_URL=postgresql+psycopg2://postgres:password@host.docker.internal:5432/akn-dev-local
    extra_hosts:
      - "host.docker.internal:host-gateway"   # raggiunge il Postgres dell'host su Linux
    ports:
      - "9955:9955"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URL usato dal browser per raggiungere il backend sull'host
        VITE_API_URL: http://localhost:9955
      secrets:
        - npmrc            # credenziali Nexus per `npm install` (vedi Dockerfile)
    container_name: tabula-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

secrets:
  npmrc:
    file: ${USERPROFILE}/.npmrc   # il tuo ~/.npmrc con registry + _authToken Nexus
