# DEVELOPMENT mode with hot-reload.
# Sources are mounted into the containers: every change is applied on the fly,
# without rebuilding the images.
#   Start:  docker compose -f docker-compose.dev.yml up   (or dev-tabula.bat)
services:
  backend:
    build: ./backend
    container_name: tabula-backend-dev
    command: sh -c "alembic upgrade head && uvicorn tabula_server:app --host 0.0.0.0 --port 9955 --reload"
    environment:
      - TABULA_DB_URL=${TABULA_DB_URL:-postgresql+psycopg2://postgres:password@host.docker.internal:5432/tabula}
      - WATCHFILES_FORCE_POLLING=true   # reliable reload on Windows bind mounts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app                  # live sources
    ports:
      - "9955:9955"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: tabula-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:9955
      - VITE_USE_POLLING=true           # detects changes on Windows bind mounts
    volumes:
      - ./frontend:/app                 # live sources
      - /app/node_modules               # container's node_modules (not overwritten by the host)
      # Public npm registry by default. Behind a private/proxy registry, mount your
      # ~/.npmrc by setting NPMRC_FILE in the .env (see .env.example) and by uncommenting:
      # - ${NPMRC_FILE}:/root/.npmrc:ro
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
